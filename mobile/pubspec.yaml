name: trustos
description: TrustOS mobile app — offline-first Flutter client (see docs/09-mobile-architecture.md).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management (shared-context: Riverpod chosen over Bloc)
  flutter_riverpod: ^2.6.1

  # Navigation (09-mobile-architecture §5.1: StatefulShellRoute 5-tab shell)
  go_router: ^14.6.2

  # Offline-first local store (shared-context: Drift/SQLite)
  drift: ^2.22.1
  drift_flutter: ^0.2.4

  # Networking (core/networking: dio builder + auth interceptor + RFC 9457 mapping)
  dio: ^5.7.0

  # Domain layer (09 §1: domain may import equatable only)
  equatable: ^2.0.7

  # l10n
  intl: any
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.22.1

flutter:
  uses-material-design: true
  generate: true # flutter gen-l10n (config in l10n.yaml)
  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay.ttf
